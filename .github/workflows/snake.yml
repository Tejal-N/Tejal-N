name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Tejal-N
outputs: |
  dist/github-contribution-grid-snake.svg?color_snake=5EEAD4&color_dots=FFFFFF,E0F7FA,A5F3FC,67E8F9,22D3EE
  
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
