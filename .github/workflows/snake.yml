name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Tejal-N
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=2DD4BF&color_dots=0D1117,164E63,0891B2,06B6D4,2DD4BF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=2DD4BF&color_dots=0D1117,164E63,0891B2,06B6D4,2DD4BF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
